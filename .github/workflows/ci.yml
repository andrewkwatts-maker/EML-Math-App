name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: System libraries for Kivy headless import
        run: sudo apt-get update && sudo apt-get install -y libmtdev-dev xvfb

      - name: Install eml-math from GitHub (pre-PyPI release window)
        run: pip install "eml-math @ git+https://github.com/andrewkwatts-maker/EML-Math@v1.3.0"

      - name: Install app + dev deps
        run: pip install .[dev]

      - name: Run smoke tests (headless)
        env:
          KIVY_NO_ARGS: "1"
          KIVY_WINDOW: mock
        run: pytest tests/ -v --tb=short
